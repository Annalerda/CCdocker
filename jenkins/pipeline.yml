pipeline {
    agent any
    stages {
        stage('Clonage') {
            steps {
                git branch: 'main', url: 'https://github.com/Annalerda/CCdocker.git'
            }
        }
        stage('Image') {
            steps {
                sh "docker build -t princesseannie/lerda-flask-app ."
            }
        }
        stage('Publication') {
            steps {
                script {
                    withCredentials([usernamePassword(credentialsId: 'dockerhub-auth', passwordVariable: 'PASS', usernameVariable: 'USER')]) {
                        sh "echo $PASS | docker login -u $USER --password-stdin"
                        sh "docker push princesseannie/lerda-flask-app:latest"
                    }
                }
            }
        }
    }
}
